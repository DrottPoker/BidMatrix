name: bidmatrix

services:
  postgres:
    image: postgres:18.4-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_AUDIT_USER: ${POSTGRES_AUDIT_USER}
      POSTGRES_AUDIT_PASSWORD: ${POSTGRES_AUDIT_PASSWORD}
    ports:
      - "${POSTGRES_EXPOSED_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      S3_BUCKET_QUARANTINE: ${S3_BUCKET_QUARANTINE}
      S3_BUCKET_PRIVATE: ${S3_BUCKET_PRIVATE}
    entrypoint:
      - /bin/sh
      - -ec
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}";
        mc mb --ignore-existing "local/$${S3_BUCKET_QUARANTINE}";
        mc mb --ignore-existing "local/$${S3_BUCKET_PRIVATE}"
    restart: "no"

  temporal-init:
    image: busybox:1.37.0-musl
    user: "0:0"
    command: ["chown", "-R", "1000:1000", "/var/lib/temporal"]
    volumes:
      - temporal-data:/var/lib/temporal
    restart: "no"

  temporal:
    image: temporalio/temporal:1.6.1
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --db-filename
      - /var/lib/temporal/temporal.db
    ports:
      - "7233:7233"
      - "8233:8233"
    volumes:
      - temporal-data:/var/lib/temporal
    depends_on:
      temporal-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "localhost:7233"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${BIDMATRIX_ENVIRONMENT}
      BIDMATRIX_ENVIRONMENT: ${BIDMATRIX_ENVIRONMENT}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_AUDIT_USER: ${POSTGRES_AUDIT_USER}
      POSTGRES_AUDIT_PASSWORD: ${POSTGRES_AUDIT_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION}
      S3_BUCKET_QUARANTINE: ${S3_BUCKET_QUARANTINE}
      S3_BUCKET_PRIVATE: ${S3_BUCKET_PRIVATE}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      FILE_SCAN_MODE: ${FILE_SCAN_MODE}
      MAX_PDF_UPLOAD_BYTES: ${MAX_PDF_UPLOAD_BYTES}
      FILE_RETENTION_DAYS: ${FILE_RETENTION_DAYS}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      OWNER_BOOTSTRAP_EMAIL: ${OWNER_BOOTSTRAP_EMAIL}
      OWNER_BOOTSTRAP_PASSWORD: ${OWNER_BOOTSTRAP_PASSWORD}
      OWNER_BOOTSTRAP_DISPLAY_NAME: ${OWNER_BOOTSTRAP_DISPLAY_NAME}
      DATA_PROTECTION_KEYS_PATH: ${DATA_PROTECTION_KEYS_PATH}
      ENGINEERING_REPOSITORY_ROOT: ${ENGINEERING_REPOSITORY_ROOT}
      ENGINEERING_WORKTREE_ROOT: ${ENGINEERING_WORKTREE_ROOT}
      ENGINEERING_COMMAND_TIMEOUT_SECONDS: ${ENGINEERING_COMMAND_TIMEOUT_SECONDS}
      ENGINEERING_MAX_OUTPUT_BYTES: ${ENGINEERING_MAX_OUTPUT_BYTES}
    ports:
      - "8080:8080"
    volumes:
      - data-protection-keys:/var/lib/bidmatrix/data-protection
      - engineering-worktrees:/var/lib/bidmatrix/engineering/worktrees
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dotnet", "BidMatrix.Api.dll", "--healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  agent-worker:
    build:
      context: .
      dockerfile: infra/docker/agent-worker.Dockerfile
    environment:
      BIDMATRIX_ENVIRONMENT: ${BIDMATRIX_ENVIRONMENT}
      BIDMATRIX_INTERNAL_BASE_URL: http://api:8080
      BIDMATRIX_AGENT_MODE: ${BIDMATRIX_AGENT_MODE:-deterministic}
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_EXECUTIVE: ${OPENAI_MODEL_EXECUTIVE:-}
      OPENAI_MODEL_SUPPORT: ${OPENAI_MODEL_SUPPORT:-}
      OPENAI_MODEL_PRODUCT: ${OPENAI_MODEL_PRODUCT:-}
      OPENAI_MODEL_ENGINEERING: ${OPENAI_MODEL_ENGINEERING:-}
      OPENAI_AGENTS_DISABLE_TRACING: ${OPENAI_AGENTS_DISABLE_TRACING}
      OPENAI_AGENTS_DONT_LOG_MODEL_DATA: ${OPENAI_AGENTS_DONT_LOG_MODEL_DATA}
      OPENAI_AGENTS_DONT_LOG_TOOL_DATA: ${OPENAI_AGENTS_DONT_LOG_TOOL_DATA}
    ports:
      - "8081:8081"
    depends_on:
      api:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8081/health/ready', timeout=2)
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://localhost:3000').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
  temporal-data:
  data-protection-keys:
  engineering-worktrees:
